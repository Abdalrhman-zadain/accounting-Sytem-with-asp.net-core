name: Build Print Agent

on:
  workflow_dispatch:
  push:
    branches: [pos-market, main]
    paths:
      - "tools/print-agent/**"
      - ".github/workflows/build-print-agent.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Print Agent
        shell: pwsh
        run: |
          $project = "tools/print-agent/src/SimpleAccount.PrintAgent/SimpleAccount.PrintAgent.csproj"
          $out = "tools/print-agent/publish/win-x64"
          dotnet publish $project `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -o $out

      - name: Create zip
        shell: pwsh
        run: |
          $zip = "frontend/public/downloads/simple-account-print-agent.zip"
          New-Item -ItemType Directory -Force -Path (Split-Path $zip) | Out-Null
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "tools/print-agent/publish/win-x64/*" -DestinationPath $zip -Force
          Get-Item $zip | Format-List FullName, Length

      - name: Upload installer zip
        uses: actions/upload-artifact@v4
        with:
          name: simple-account-print-agent
          path: frontend/public/downloads/simple-account-print-agent.zip
          retention-days: 90

      - name: Commit zip to pos-market
        if: github.ref == 'refs/heads/pos-market'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add frontend/public/downloads/simple-account-print-agent.zip
          git diff --staged --quiet && echo "Zip unchanged, skip commit" && exit 0
          git commit -m "Build print agent installer zip [skip ci]"
          git push origin HEAD:pos-market
