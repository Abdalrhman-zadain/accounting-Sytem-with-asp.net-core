<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8"/>
  <title>تذكرة مطبخ</title>
  <style>
    @page { size: 80mm auto; margin: 0 4mm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      width: 72mm;
      max-width: 72mm;
      margin: 0 auto;
      padding: 4mm 3mm;
      color: #000;
    }
    .center { text-align: center; }
    .bold { font-weight: bold; }
    .title { font-size: 12pt; margin-bottom: 4px; }
    .new-order-title {
      font-size: 14pt;
      font-weight: 900;
      margin-bottom: 4px;
      border: 2px solid #000;
      padding: 4px 2px;
    }
    .void-title { font-size: 12pt; margin-bottom: 4px; }
    .order-number-banner {
      font-size: 20pt;
      font-weight: 900;
      text-align: center;
      margin: 6px 0 4px;
      padding: 5px 4px;
      border: 2px solid #000;
    }
    .order-type-banner { font-size: 16pt; font-weight: bold; text-align: center; margin: 4px 0; }
    .sep { text-align: center; margin: 6px 0; overflow: hidden; }
    .row { display: flex; justify-content: space-between; gap: 8px; margin: 2px 0; }
    .meta-block { margin: 4px 0; word-wrap: break-word; }
    .meta-block .label { font-weight: bold; }
    .order-note-panel {
      width: 100%;
      max-width: 100%;
      border: 2px solid #000;
      margin: 7px 0 4px;
      padding: 5px 4px;
      overflow: hidden;
      text-align: center;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .order-note-label {
      font-size: 11pt;
      font-weight: 900;
      margin-bottom: 3px;
    }
    .order-note-text {
      font-weight: 900;
      line-height: 1.4;
      text-align: start;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
      max-width: 100%;
    }
    .order-note-text--lg {
      font-size: 14pt;
      text-align: center;
    }
    .order-note-text--md {
      font-size: 11pt;
    }
    .order-note-text--sm {
      font-size: 10pt;
    }
    .item { margin: 6px 0; }
    .item-row { display: flex; gap: 6px; align-items: baseline; }
    .item-qty { font-size: 14pt; font-weight: bold; flex-shrink: 0; }
    .item-name { font-size: 12pt; flex: 1; }
    .item-addons-block { margin-top: 4px; padding-inline-start: 10px; }
    .item-addons-label { font-size: 11pt; font-weight: bold; margin-bottom: 2px; }
    .item-addon-line { font-size: 12pt; font-weight: 900; line-height: 1.45; margin: 2px 0; }
    .line-note {
      font-weight: 900;
      line-height: 1.4;
      margin-top: 4px;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
      max-width: 100%;
    }
    .line-note--lg { font-size: 11pt; }
    .line-note--md { font-size: 10pt; }
    .line-note--sm { font-size: 9pt; }
</style>
</head>
<body>
    <div class="center bold title">تذكرة مطبخ</div>
    <div class="order-number-banner">رقم الطلب: 1042</div>
    
    <div class="order-type-banner">سفري</div>
    <div class="sep">────────────────────────────────</div>
    <div class="row"><span>الوقت</span><span>11:39 2026-06-20</span></div>
<div class="row"><span>ملاحظة الطلب</span><span>على السريع</span></div>
    
    <div class="order-note-panel">
      <div class="order-note-label">ملاحظة مهمة للمطبخ</div>
      <div class="order-note-text order-note-text--lg">على السريع</div>
    </div>
    <div class="sep">────────────────────────────────</div>
    
    <div class="item">
      <div class="item-row bold">
        <span class="item-qty">2×</span>
        <span class="item-name">شاورما دجاج</span>
      </div>
      <div class="item-addons-block"><div class="item-addons-label">إضافات</div><div class="item-addon-line">+ ثومية</div></div>
      <div class="line-note line-note--lg">حار جداً</div>
    </div>
    <div class="sep">────────────────────────────────</div>
  </body>
</html>
