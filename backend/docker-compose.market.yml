services:
  postgres:
    image: postgres:16-alpine
    container_name: simple-account-pos-m-ch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: simple-account-pos-m-ch
      POSTGRES_USER: simple_account_user
      POSTGRES_PASSWORD: simple_account_pass
    ports:
      - "15433:5432"
    volumes:
      - postgres_pos_market_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U simple_account_user -d 'simple-account-pos-m-ch'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_pos_market_data:
